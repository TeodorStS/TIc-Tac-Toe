<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>

    <!-- Links to our separate CSS file. The browser will load and apply it before rendering the page -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <h1>Tic Tac Toe</h1>

    <!-- This div will show messages like "Your turn", "You win", "AI wins" -->
    <p id="status">Your turn</p>

    <!-- This div is the board container. The 9 cells will be created inside it by JavaScript -->
    <div id="board"></div>

    <button id="reset-btn">New Game</button>

    <!-- Links to our separate JS file. Placed at the bottom of body so that the HTML elements
      above are already loaded before the script tries to access them -->
    <script src="script.js"></script>

  </body>

</html>
